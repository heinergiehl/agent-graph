name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['12.*', '13.*']
        # laravel/ai ^1.0 is allowed by composer.json for forward compatibility,
        # but no 1.x release exists yet. Add it back here once upstream tags it.
        laravel-ai: ['^0.7']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/cache:${{ matrix.laravel }}" \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/events:${{ matrix.laravel }}" \
            "illuminate/queue:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "laravel/ai:${{ matrix.laravel-ai }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Validate composer
        run: composer validate --strict

      - name: Run checks
        run: composer check
