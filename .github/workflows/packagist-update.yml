name: Update Packagist

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: packagist-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
      PACKAGIST_REPOSITORY_URL: https://github.com/heinergiehl/agent-graph

    steps:
      - name: Skip when Packagist secrets are missing
        if: ${{ env.PACKAGIST_USERNAME == '' || env.PACKAGIST_API_TOKEN == '' }}
        run: echo "::notice::Add PACKAGIST_USERNAME and PACKAGIST_API_TOKEN repository secrets to enable Packagist updates."

      - name: Trigger Packagist update
        if: ${{ env.PACKAGIST_USERNAME != '' && env.PACKAGIST_API_TOKEN != '' }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            --data "{\"repository\":{\"url\":\"${PACKAGIST_REPOSITORY_URL}\"}}"
